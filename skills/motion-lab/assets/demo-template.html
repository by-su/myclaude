<!DOCTYPE html>
<html lang="en" class="bg-zinc-950 text-zinc-50 antialiased">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Motion Demo</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
            display: ['"Instrument Serif"', 'serif'],
            mono: ['"JetBrains Mono"', 'monospace']
          }
        }
      }
    }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- ⚠️ react/jsx-runtime, react/jsx-dev-runtime 항목 절대 빼지 말 것.
       Babel standalone의 React preset이 automatic JSX runtime을 기본으로 쓰면서
       내부적으로 `import { jsx } from "react/jsx-runtime"`을 발생시키기 때문.
       이 두 줄이 없으면 브라우저가 module specifier 해석 실패로 검은 화면만 보임. -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.3.1",
        "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
        "react/jsx-dev-runtime": "https://esm.sh/react@18.3.1/jsx-dev-runtime",
        "react-dom": "https://esm.sh/react-dom@18.3.1",
        "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
        "framer-motion": "https://esm.sh/framer-motion@11.18.2?external=react,react-dom",
        "gsap": "https://esm.sh/gsap@3.12.5",
        "gsap/ScrollTrigger": "https://esm.sh/gsap@3.12.5/ScrollTrigger?external=gsap",
        "gsap/Flip": "https://esm.sh/gsap@3.12.5/Flip?external=gsap"
      }
    }
  </script>

  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    html, body { -webkit-font-smoothing: antialiased; }
    body { overscroll-behavior: none; }
    *::selection { background: rgba(255, 255, 255, 0.15); }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body class="min-h-screen font-sans">
  <div id="root"></div>

  <script type="text/babel" data-type="module" data-presets="react">
    import React, { useState, useRef, useEffect, useLayoutEffect } from "react";
    import { createRoot } from "react-dom/client";
    import {
      motion,
      AnimatePresence,
      MotionConfig,
      useScroll,
      useTransform,
      useSpring,
      useMotionValue,
      useInView,
      useMotionValueEvent,
      LayoutGroup,
      Reorder
    } from "framer-motion";
    // GSAP는 필요할 때만 import (느림 방지)
    // import gsap from "gsap";
    // import ScrollTrigger from "gsap/ScrollTrigger";
    // gsap.registerPlugin(ScrollTrigger);

    // ============ Easing tokens ============
    const EASE_OUT_QUART = [0.22, 1, 0.36, 1];   // 일반 default
    const EASE_SNAPPY    = [0.4, 0, 0.2, 1];     // 짧고 결단력 있는 변화
    const EASE_EXPO_OUT  = [0.16, 1, 0.3, 1];    // 강한 감속
    const SPRING_SOFT    = { type: "spring", stiffness: 260, damping: 26 };
    const SPRING_BOUNCY  = { type: "spring", stiffness: 400, damping: 18 };

    // ============ Demo ============
    function App() {
      return (
        <main className="min-h-screen flex items-center justify-center p-8">
          <motion.div
            initial={{ opacity: 0, y: 20 }}
            animate={{ opacity: 1, y: 0 }}
            transition={{ duration: 0.7, ease: EASE_OUT_QUART }}
            className="text-5xl font-display tracking-tight"
          >
            Replace me with your demo
          </motion.div>
        </main>
      );
    }

    // ============ Root ============
    createRoot(document.getElementById("root")).render(
      <MotionConfig reducedMotion="user" transition={{ duration: 0.6, ease: EASE_OUT_QUART }}>
        <App />
      </MotionConfig>
    );
  </script>
</body>
</html>
